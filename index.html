<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Таймер</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a2e;
            color: #ffffff;
        }

        #header {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #f39c12, #d35400);
            color: white;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(243, 156, 18, 0.6);
        }

        .btn:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        #sign-in-btn {
            background: #0984e3;
            box-shadow: 0 4px 15px rgba(9, 132, 227, 0.4);
            font-size: 16px;
            padding: 10px 20px;
        }

        #timer-display {
            font-size: 48px;
            font-weight: bold;
            color: #00cec9;
            text-shadow: 0 0 10px rgba(0, 206, 201, 0.5);
            margin-top: 20px;
        }

        .hidden { display: none !important; }
        #main-container { text-align: center; }
        h1 { margin-bottom: 30px; font-weight: 300; }
    </style>
</head>
<body>

    <div id="header">
        <div id="user-button"></div>
        <button id="sign-in-btn" class="btn hidden">Войти</button>
    </div>

    <div id="main-container">
        <h1 id="welcome-text">Загрузка...</h1>
        
        <div id="vip-section" class="hidden">
            <button id="vip-btn" class="btn">VIP</button>
            <div id="timer-display" class="hidden">60</div>
        </div>
    </div>

    <script 
        async 
        crossorigin="anonymous" 
        data-clerk-publishable-key="pk_test_c291bmQtc3RhcmxpbmctNDYuY2xlcmsuYWNjb3VudHMuZGV2JA" 
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js">
    </script>

    <script>
        const MY_SITE = 'https://skibii323-web.github.io/ssss211/';
        const TIMER_DURATION_MS = 60 * 1000; 

        // Ждем полной загрузки страницы и скрипта Clerk
        window.addEventListener('load', async () => {
            if (!window.Clerk) {
                document.getElementById('welcome-text').innerText = 'Ошибка: Clerk не загрузился. Проверьте интернет.';
                return;
            }

            try {
                await window.Clerk.load();
                initializeApp();
            } catch (err) {
                console.error('Ошибка запуска Clerk:', err);
                document.getElementById('welcome-text').innerText = 'Ошибка системы авторизации.';
            }
        });

        function initializeApp() {
            const clerk = window.Clerk;
            const signInBtn = document.getElementById('sign-in-btn');
            const userButtonDiv = document.getElementById('user-button');
            const welcomeText = document.getElementById('welcome-text');
            const vipSection = document.getElementById('vip-section');
            const vipBtn = document.getElementById('vip-btn');
            const timerDisplay = document.getElementById('timer-display');
            
            let timerInterval;

            if (clerk.user) {
                // Пользователь АВТОРИЗОВАН
                clerk.mountUserButton(userButtonDiv); 
                signInBtn.classList.add('hidden');
                welcomeText.innerText = `Добро пожаловать, ${clerk.user.firstName || 'Пользователь'}!`;
                vipSection.classList.remove('hidden');

                checkTimerState();
            } else {
                // Пользователь НЕ АВТОРИЗОВАН
                signInBtn.classList.remove('hidden');
                welcomeText.innerText = 'Войдите в систему для доступа к VIP';
                vipSection.classList.add('hidden');

                signInBtn.onclick = () => {
                    clerk.openSignIn({
                        afterSignInUrl: MY_SITE,
                        afterSignUpUrl: MY_SITE
                    });
                };
            }

            function checkTimerState() {
                // Защита от пустой меты
                const meta = clerk.user.unsafeMetadata || {};
                const clickTime = meta.vipClickTime;
                
                if (clickTime) {
                    const elapsedTime = Date.now() - clickTime;
                    const remainingTime = TIMER_DURATION_MS - elapsedTime;
                    
                    if (remainingTime > 0) {
                        startTimerUI(remainingTime);
                    } else {
                        showVipButton();
                    }
                } else {
                    showVipButton();
                }
            }

            function showVipButton() {
                vipBtn.classList.remove('hidden');
                timerDisplay.classList.add('hidden');
                
                vipBtn.onclick = async () => {
                    vipBtn.disabled = true; 
                    try {
                        await clerk.user.update({
                            unsafeMetadata: { vipClickTime: Date.now() }
                        });
                        startTimerUI(TIMER_DURATION_MS);
                    } catch (error) {
                        console.error('Ошибка сохранения данных в Clerk:', error);
                        alert('Ошибка. Попробуйте еще раз.');
                    } finally {
                        vipBtn.disabled = false;
                    }
                };
            }

            function startTimerUI(durationMs) {
                vipBtn.classList.add('hidden');
                timerDisplay.classList.remove('hidden');
                
                const endTime = Date.now() + durationMs;

                updateClock();
                timerInterval = setInterval(updateClock, 1000);

                function updateClock() {
                    const timeLeft = endTime - Date.now();
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        showVipButton();
                    } else {
                        const seconds = Math.ceil(timeLeft / 1000);
                        timerDisplay.innerText = `${seconds} сек`;
                    }
                }
            }
        }
    </script>
</body>
</html>
