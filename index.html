<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Premium Portal</title>
    
    <script 
        async 
        crossorigin="anonymous" 
        data-clerk-publishable-key="pk_test_c291bmQtc3RhcmxpbmctNDYuY2xlcmsuYWNjb3VudHMuZGV2JA" 
        src="https://sound-starling-46.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" 
        type="text/javascript">
    </script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0b0914; /* Соответствие оригинальной палитре */
            background-image: radial-gradient(circle at 50% 50%, #1a153a 0%, #0b0914 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        /* Блок авторизации в верхнем углу */
        .auth-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 16px 6px 6px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .auth-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255, 215, 0, 0.6);
            object-fit: cover;
        }

        .btn-action {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 8px;
            transition: color 0.2s ease;
        }

        .btn-action:hover {
            color: #ffcc00;
        }

        .login-btn {
            background: rgba(255, 255, 255, 0.07);
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .login-btn:hover {
            background: #ffffff;
            color: #0b0914;
        }

        /* Центральный контейнер */
        .main-panel {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #a5a1b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 14px;
            color: #8a8a9e;
            margin-bottom: 30px;
        }

        /* Большая кнопка VIP */
        .vip-button {
            width: 100%;
            padding: 20px;
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #0b0914;
            background: linear-gradient(135deg, #ffe066 0%, #f5b041 100%);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(245, 176, 65, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .vip-button:hover:not(:disabled) {
            transform: scale(1.03);
            box-shadow: 0 0 35px rgba(245, 176, 65, 0.6);
        }

        .vip-button:active:not(:disabled) {
            transform: scale(0.98);
        }

        .vip-button:disabled {
            background: linear-gradient(135deg, #2a2836 0%, #1f1d29 100%);
            color: #5a596e;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Блок таймера обратного отсчета */
        .timer-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
            animation: fadeIn 0.4s ease forwards;
        }

        .countdown-circle {
            font-size: 42px;
            font-weight: 800;
            color: #ffaa00;
            text-shadow: 0 0 20px rgba(255, 170, 0, 0.5);
            font-variant-numeric: tabular-nums;
            margin-bottom: 8px;
        }

        .timer-label {
            font-size: 13px;
            color: #a5a1b8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="auth-container" id="authZone">
        <button class="btn-action login-btn" onclick="triggerLogin()">Загрузка...</button>
    </div>

    <div class="main-panel">
        <h1>PREMIUM ACCESS</h1>
        <div class="subtitle" id="statusMessage">Подключение к защищенной сессии...</div>

        <button class="vip-button" id="vipBtn" onclick="activateVip()" disabled>
            VIP BUTTON
        </button>

        <div class="timer-container" id="timerZone">
            <div class="countdown-circle" id="countdownValue">60s</div>
            <div class="timer-label">VIP Статус Активен</div>
        </div>
    </div>

    <script>
        // Конфигурационные константы согласно ТЗ
        const MY_SITE = 'https://skibii323-web.github.io/ssss211/';
        let timerTicker = null;

        // Отслеживание загрузки Clerk SDK
        window.addEventListener('load', async () => {
            if (typeof Clerk !== 'undefined') {
                try {
                    await Clerk.load();
                    syncAppLogic();
                } catch (err) {
                    console.error("Ошибка при инициализации Clerk:", err);
                    document.getElementById('statusMessage').textContent = "Ошибка авторизации.";
                }
            } else {
                console.error("Clerk script failed to load. Check API key configuration.");
                document.getElementById('statusMessage').textContent = "Ошибка загрузки SDK.";
            }
        });

        // Основной цикл синхронизации состояния приложения
        function syncAppLogic() {
            renderAuthZone();
            evaluateVipState();
        }

        // Рендеринг интерфейса авторизации (Верхний угол)
        function renderAuthZone() {
            const authZone = document.getElementById('authZone');
            
            if (!Clerk.user) {
                // Гость
                authZone.innerHTML = `
                    <button class="btn-action login-btn" onclick="triggerLogin()">Войти</button>
                `;
            } else {
                // Авторизованный пользователь
                authZone.innerHTML = `
                    <div class="auth-profile">
                        <img src="${Clerk.user.imageUrl}" alt="User Avatar" class="user-avatar">
                        <button class="btn-action" onclick="triggerLogout()">Выйти</button>
                    </div>
                `;
            }
        }

        // Проверка и валидация облачного статуса VIP
        function evaluateVipState() {
            const vipBtn = document.getElementById('vipBtn');
            const timerZone = document.getElementById('timerZone');
            const statusMessage = document.getElementById('statusMessage');

            // Сброс предыдущего интервала, если он существовал
            if (timerTicker) clearInterval(timerTicker);

            if (!Clerk.user) {
                // Обработка неавторизованного состояния
                statusMessage.textContent = "Войдите в систему для разблокировки контента";
                vipBtn.style.display = "block";
                vipBtn.disabled = false;
                vipBtn.textContent = "VIP (Требуется вход)";
                timerZone.style.display = "none";
                return;
            }

            // Чтение безопасных облачных метаданных пользователя
            const metadata = Clerk.user.unsafeMetadata || {};
            const vipExpiresAt = metadata.vipExpiresAt;
            const now = Date.now();

            if (vipExpiresAt && vipExpiresAt > now) {
                // Обнаружен активный действующий таймер в облаке
                statusMessage.textContent = "Вы являетесь VIP пользователем";
                vipBtn.style.display = "none";
                timerZone.style.display = "flex";
                runCountdown(vipExpiresAt);
            } else {
                // Статус неактивен или время истекло
                statusMessage.textContent = "Добро пожаловать! Ваш VIP статус готов к активации";
                vipBtn.style.display = "block";
                vipBtn.disabled = false;
                vipBtn.textContent = "🔥 VIP 🔥";
                timerZone.style.display = "none";
            }
        }

        // Запуск локального отсчета на базе серверной метки времени
        function runCountdown(expiryTimestamp) {
            const countdownValue = document.getElementById('countdownValue');

            function updateTick() {
                const now = Date.now();
                const timeLeft = Math.ceil((expiryTimestamp - now) / 1000);

                if (timeLeft <= 0) {
                    clearInterval(timerTicker);
                    // Очищаем истекшую метку в облаке для предотвращения рассинхронизации
                    if (Clerk.user) {
                        Clerk.user.update({
                            unsafeMetadata: { vipExpiresAt: null }
                        }).then(() => {
                            evaluateVipState();
                        });
                    } else {
                        evaluateVipState();
                    }
                    return;
                }
                countdownValue.textContent = `Осталось: ${timeLeft}с`;
            }

            updateTick();
            timerTicker = setInterval(updateTick, 1000);
        }

        // Действие при клике на VIP кнопку
        async function activateVip() {
            if (!Clerk.user) {
                // Если гость кликает на кнопку, отправляем его на авторизацию
                triggerLogin();
                return;
            }

            const vipBtn = document.getElementById('vipBtn');
            vipBtn.disabled = true;
            vipBtn.textContent = "Синхронизация...";

            // Вычисляем абсолютное время окончания (текущее время + 60 секунд)
            const targetExpiration = Date.now() + 60000;

            try {
                // Сохраняем состояние в облачное хранилище Clerk Metadata
                await Clerk.user.update({
                    unsafeMetadata: {
                        vipExpiresAt: targetExpiration
                    }
                });
                
                // Перепроверяем состояние системы для переключения интерфейса
                evaluateVipState();
            } catch (err) {
                console.error("Ошибка при сохранении VIP статуса в Clerk Cloud:", err);
                alert("Ошибка соединения с сервером Clerk. Попробуйте еще раз.");
                vipBtn.disabled = false;
                vipBtn.textContent = "🔥 VIP 🔥";
            }
        }

        // Вызов окна входа Clerk
        function triggerLogin() {
            Clerk.openSignIn({
                afterSignInUrl: MY_SITE,
                afterSignUpUrl: MY_SITE
            });
        }

        // Вызов сессии выхода Clerk
        function triggerLogout() {
            Clerk.signOut({
                redirectUrl: MY_SITE
            });
        }
    </script>
</body>
</html>
